<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百家乐数据分析研究戒赌软件</title>
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --accent: #ffd700; --win: #32d74b; --loss: #ff453a; --border: #333; --banker-bg: #ff453a; --player-bg: #0a84ff; --wait-bg: #555555; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; -webkit-user-select: none; user-select: none; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; display: none; justify-content: center; align-items: center; color: var(--accent); font-weight: bold; font-size: 18px; backdrop-filter: blur(5px); }
        .overlay-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 9999; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        .modal-box { width: 85%; max-width: 340px; text-align: center; background: #1c1c1e; padding: 25px 20px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .modal-input { width: 100%; padding: 12px; margin: 8px 0 15px 0; background: #2c2c2e; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        .modal-input:focus { border-color: var(--accent); }
        .modal-label { text-align: left; color: #aaa; font-size: 13px; font-weight: bold; margin-left: 2px; margin-bottom: 5px; }
        .modal-btn { width: 100%; padding: 14px; background: var(--accent); color: #000; font-weight: 800; border: none; border-radius: 8px; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-cancel { background: #444; color: #fff; }
        #appLayer { display: none; min-height: 100vh; flex-direction: column; }
        .header { padding: 10px 15px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 999; }
        .app-title { font-weight: 800; font-size: 15px; color: #aaa; letter-spacing: 0.5px; position: absolute; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 1; }
        .btn-group-top { display: flex; gap: 8px; z-index: 2; }
        .btn-small { background: #333; color: #ccc; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-reset { color: var(--loss); }
        .btn-logout { background: transparent; border: 1px solid #666; color: #aaa; }
        .btn-setting { background: transparent; border: 1px solid #555; color: #fff; display: none; }
        .dashboard { padding: 10px; background: var(--card); flex-shrink: 0; }
        .pl-display-area { text-align: center; padding: 5px 0 10px 0; }
        .pl-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .pl-value { font-size: 36px; font-weight: 900; font-family: monospace; line-height: 1.1; }
        .comm-row { text-align: center; font-size: 12px; color: #666; margin-bottom: 10px; }
        .cum-scores-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 15px; }
        .cum-item { background: #2c2c2e; border-radius: 8px; padding: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .cum-label { font-size: 11px; color: #aaa; margin-bottom: 2px; font-weight: bold; text-align: center; }
        .cum-val-box { display: flex; align-items: baseline; gap: 3px; }
        .cum-val { font-size: 16px; font-weight: bold; }
        .cum-rate { font-size: 10px; color: #888; }
        .reg-progress-area { margin-bottom: 8px; padding: 0 4px; }
        .reg-label-row { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 4px; font-weight: bold; }
        .reg-bar-bg { height: 6px; background: #333; border-radius: 3px; overflow: hidden; border: 1px solid #444; }
        .reg-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent) 0%, var(--win) 100%); box-shadow: 0 0 8px rgba(50, 215, 75, 0.2); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .labouchere-display { background: #111; border: 1px dashed #444; border-radius: 8px; padding: 8px; margin-bottom: 8px; text-align: center; font-size: 16px; color: var(--accent); font-family: monospace; font-weight: bold; display: none; word-wrap: break-word; letter-spacing: 1px; }
        .labouchere-label { font-size: 10px; color: #888; display: block; margin-bottom: 4px; letter-spacing: normal; font-family: -apple-system, sans-serif; font-weight: normal; }
        .dual-core-container { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .core-box { background: #111; border: 1px dashed #555; border-radius: 8px; padding: 8px; text-align: center; position: relative; }
        .core-title { font-size: 11px; color: #aaa; margin-bottom: 4px; font-weight: bold;}
        .core-seq { font-size: 14px; font-family: monospace; color: var(--accent); font-weight: bold; word-wrap: break-word;}
        .core-pl { font-size: 12px; font-weight: bold; margin-top: 5px; }
        .sys-log-box { background: rgba(0,0,0,0.3); border-left: 3px solid #0a84ff; padding: 6px 10px; font-size: 11px; color: #ccc; margin-bottom: 8px; height: 45px; overflow-y: auto; border-radius: 0 8px 8px 0; display: flex; flex-direction: column; justify-content: flex-end; }
        .log-entry { margin-top: 2px; }
        .instr-card { background: linear-gradient(135deg, #3a3a3c, #2c2c2e); border: 1px solid #444; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 10px; }
        .phase-text { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .main-instr { font-size: 28px; font-weight: 900; line-height: 1.2; display: flex; justify-content: center; align-items: baseline; gap: 10px; }
        .wl-container { background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .wl-stats { font-size: 11px; color: #888; margin-bottom: 6px; border-bottom: 1px solid #222; padding-bottom: 4px; display: flex; justify-content: space-between; }
        .wl-list { display: flex; flex-wrap: wrap; gap: 4px; font-size: 14px; min-height: 20px; max-height: 60px; overflow-y: auto; align-content: flex-start; }
        .wl-item-win { color: var(--win); }
        .wl-item-loss { color: var(--loss); }
        .side-B { color: var(--banker-bg); }
        .side-P { color: var(--player-bg); }
        .side-Wait { color: #888; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-big { padding: 18px; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; color: white; box-shadow: 0 6px 0 rgba(0,0,0,0.4); transition: all 0.05s ease; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; position: relative; top: 0; }
        .bg-b { background: var(--banker-bg); }
        .bg-p { background: var(--player-bg); }
        .btn-big:active { transform: scale(0.95); box-shadow: 0 2px 0 rgba(0,0,0,0.4); filter: brightness(0.7); top: 4px; }
        .btn-disabled { filter: grayscale(100%) opacity(0.5) !important; pointer-events: none; box-shadow: none !important; top: 4px !important; transform: scale(0.98); }
        
        /* 🚨 核心改动：默认直接隐藏大表区域，只有管理员验证通过才显示 */
        .table-wrap { flex-grow: 1; background: #000; border-top: 1px solid var(--border); padding-bottom: 40px; display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; table-layout: fixed; }
        th { color: #888; padding: 8px 2px; font-weight: bold; border-bottom: 1px solid #333; font-size: 12px; position: sticky; top: 44px; background: #1a1a1a; z-index: 10; }
        td { padding: 10px 2px; border-bottom: 1px solid #222; color: #ddd; }
        .win-color { color: var(--win); }
        .loss-color { color: var(--loss); }
        .wait-color { color: #888; }
    </style>
</head>
<body>
    <div id="loader">⚡ 引擎连接中...</div>

    <div id="loginLayer" class="overlay-layer">
        <div class="modal-box">
            <h3 style="color:var(--accent); margin-top:0; margin-bottom:20px;">百家乐数据分析研究戒赌软件</h3>
            <input type="text" id="u" class="modal-input" placeholder="访问账号">
            <input type="password" id="p" class="modal-input" placeholder="访问密钥">
            <button class="modal-btn" onclick="tryLogin()">启 动 研 究</button>
            <div id="msg" style="color:var(--loss); font-size:12px; margin-top:10px;"></div>
        </div>
    </div>

    <div id="settingsLayer" class="overlay-layer" style="display:none;">
        <div class="modal-box">
            <h3 style="color:#fff; margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;">⚙️ 云端战术套餐设置</h3>
            <div class="modal-label">⚔️ 您被允许的战术组</div>
            <select id="selStrategy" class="modal-input"></select>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="modal-btn btn-cancel" onclick="closeSettings()">取 消</button>
                <button class="modal-btn" onclick="applySettings()">保存并重置云端</button>
            </div>
        </div>
    </div>

    <div id="appLayer">
        <div class="header">
            <div style="display:flex; gap:8px; z-index:2;">
                <button class="btn-small btn-setting" id="btnSetting" onclick="openSettings()">⚙️ 策略</button>
            </div>
            <span class="app-title">数据分析终端</span>
            <div class="btn-group-top">
                <button class="btn-small btn-logout" onclick="logout()">登出</button>
                <button class="btn-small btn-reset" onclick="sendAction('RESET')">重置</button>
            </div>
        </div>

        <div class="dashboard">
            <div class="pl-display-area">
                <div class="pl-label">账户总净盈亏 (NET P/L)</div>
                <div class="pl-value win-color" id="totalPL">+0.00</div>
            </div>
            <div class="comm-row" id="gameStatusLabel" style="color: var(--accent); font-size: 14px;">等待连接云端...</div>

            <div class="cum-scores-row">
                <div class="cum-item"><span class="cum-label" id="lblFibLevel">注码阶段</span><div class="cum-val-box"><span class="cum-val" id="fibLevel">0</span></div></div>
                <div class="cum-item"><span class="cum-label" id="lblTrigger">目标属性</span><div class="cum-val-box"><span class="cum-val" id="targetProp">-</span></div></div>
                <div class="cum-item"><span class="cum-label" id="lblStreak">连击层数</span><div class="cum-val-box"><span class="cum-val" id="streakCount">0</span><span class="cum-rate" id="streakRate">/4</span></div></div>
                <div class="cum-item"><span class="cum-label">总下注数</span><div class="cum-val-box"><span class="cum-val" id="betCount">0</span></div></div>
            </div>

            <div class="reg-progress-area">
                <div class="reg-label-row"><span id="lblProgress">系统模式 (MODE)</span><span id="regPercent">0%</span></div>
                <div class="reg-bar-bg"><div id="regFill" class="reg-bar-fill"></div></div>
            </div>

            <div id="sysLogBox" class="sys-log-box"></div>
            <div id="labouchereBox" class="labouchere-display"><span class="labouchere-label">当前消数序列 (LABOUCHERE)</span><span id="labouchereSeqText">1 - 1 - 1</span></div>

            <div id="dualCoreBox" class="dual-core-container">
                <div class="core-box"><div class="core-title">🧠 左脑 [策4]</div><div class="core-seq" id="c4SeqText">1-1-1</div><div class="core-pl" id="c4PlText"></div></div>
                <div class="core-box"><div class="core-title">💡 右脑 [策5]</div><div class="core-seq" id="c5SeqText">1-1-1</div><div class="core-pl" id="c5PlText"></div></div>
            </div>

            <div class="instr-card">
                <div>
                    <div class="phase-text" id="phaseTag">等待开局 - 第 1 组 | 位置 1</div>
                    <div class="main-instr" id="mainInstr"><span id="instrDir" class="side-Wait">连接中</span><span id="instrAmt" style="font-size:20px; color:#fff"></span></div>
                    <div style="font-size: 10px; color: #888; margin-top: 5px; min-height:12px;" id="instrDetail">等待引擎指令...</div>
                </div>
            </div>

            <div class="wl-container">
                <div class="wl-stats"><span>下注记录 (只显最新150条)</span><span id="wlStatsText">胜: 0 | 负: 0 | 胜率: 0%</span></div>
                <div class="wl-list" id="wlList"></div>
            </div>

            <div class="btn-row">
                <button class="btn-big bg-b" onclick="sendAction('INPUT', 'B')">录入 0 (庄)</button>
                <button class="btn-big bg-p" onclick="sendAction('INPUT', 'P')">录入 1 (闲)</button>
            </div>
            <div style="text-align:right; margin-top:5px; display: flex; justify-content: flex-end; align-items: center;">
                <button class="btn-small" style="padding: 10px 20px; font-size: 14px; background: #2c2c2e; border: 1px solid #444;" onclick="sendAction('UNDO')">⏪ 撤销上一手</button>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead><tr><th width="15%">组</th><th width="35%">结果(1/2)</th><th width="25%">动作盈亏</th><th width="25%">总盈亏</th></tr></thead>
                <tbody id="gameTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://quant-test-ksyx.onrender.com";
        const APP_VERSION = "1.1.0";

        let CRED = { u: '', p: '' };
        let currentTriggerMode = 2;
        let currentBettingMode = 'fib';
        let idleTimer = 0;

        const ALL_STRATEGIES = [
            { id: 1, val: '2_fib', label: '策略 1：2连触发 + 斐波那契' },
            { id: 2, val: '3_martingale', label: '策略 2：3连触发 + 马丁格尔' },
            { id: 3, val: 'hand_martingale', label: '策略 3：连续手拦截 + 马丁格尔' },
            { id: 4, val: '2_labouchere', label: '策略 4：2连触发 + 拉布谢尔' },
            { id: 5, val: '5_labouchere', label: '策略 5：大路四式接力 + 拉布谢尔' },
            { id: 6, val: '6_labouchere', label: '策略 6：双核对冲引擎' },
            { id: 7, val: '7_fib2', label: '策略 7：自适应状态机追踪 (防伪信号 / 动态退布)' },
            { id: 8, val: '8_radar', label: '策略 8：大道从简雷达 (独立终端)' }
        ];

        window.onload = function() {
            if (localStorage.getItem('bacc_cloud_logged_in') === 'true') {
                CRED.u = localStorage.getItem('bacc_u'); CRED.p = localStorage.getItem('bacc_p');
                let savedTrig = localStorage.getItem('bacc_trig'), savedBet = localStorage.getItem('bacc_bet');
                if (savedTrig === '8' || parseInt(savedTrig) === 8) { window.location.href = '/radar8.html'; return; }
                if(savedTrig) currentTriggerMode = savedTrig === 'hand' ? 'hand' : parseInt(savedTrig);
                if(savedBet) currentBettingMode = savedBet;
                enterApp(); sendAction('STATUS_CHECK');
                startHeartbeat();
            }
        };

        function startHeartbeat() {
            document.body.addEventListener('click', () => { idleTimer = 0; }, true);
            document.body.addEventListener('touchstart', () => { idleTimer = 0; }, true);
            setInterval(() => {
                idleTimer++;
                if(idleTimer >= 30) {
                    alert("⚠️ 长时间未操作，为保护账号安全，已自动登出。");
                    logout(true);
                } else {
                    fetch(API_URL + '/api/heartbeat', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: CRED.u })
                    }).catch(e=>{});
                }
            }, 60000); 
        }

        function showLoader() { document.getElementById('loader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }

        async function tryLogin() {
            CRED.u = document.getElementById('u').value; CRED.p = document.getElementById('p').value;
            showLoader();
            try {
                const response = await fetch(API_URL + '/api/action', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: CRED.u, password: CRED.p, command: 'STATUS_CHECK', triggerMode: currentTriggerMode, bettingMode: currentBettingMode })
                });
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('bacc_cloud_logged_in', 'true'); localStorage.setItem('bacc_u', CRED.u); localStorage.setItem('bacc_p', CRED.p);
                    enterApp(); renderUI(data); startHeartbeat();
                } else { document.getElementById('msg').innerText = "账号或密码错误，或授权已过期"; }
            } catch (error) { document.getElementById('msg').innerText = "连接服务器失败，请检查网络"; } finally { hideLoader(); }
        }

        function enterApp() { document.getElementById('loginLayer').style.display = 'none'; document.getElementById('appLayer').style.display = 'flex'; }
        function logout(force = false) { if(force || confirm("确定要退出研究系统吗？")) { localStorage.clear(); location.reload(); } }
        
        function openSettings() { 
            let curVal = (currentTriggerMode === 5 || currentTriggerMode === 6 || currentTriggerMode === 7 ? currentTriggerMode : currentTriggerMode) + '_' + currentBettingMode; 
            let sel = document.getElementById('selStrategy');
            if(Array.from(sel.options).some(opt => opt.value === curVal)) sel.value = curVal;
            document.getElementById('settingsLayer').style.display = 'flex'; 
        }
        function closeSettings() { document.getElementById('settingsLayer').style.display = 'none'; }
        function applySettings() {
            let raw = document.getElementById('selStrategy').value;
            let comboValue = raw.split('_');
            if (comboValue[0] === '8') {
                localStorage.setItem('bacc_trig', '8');
                localStorage.setItem('bacc_bet', 'radar');
                window.location.href = '/radar8.html';
                return;
            }
            currentTriggerMode = comboValue[0] === 'hand' ? 'hand' : parseInt(comboValue[0]);
            currentBettingMode = comboValue[1];
            localStorage.setItem('bacc_trig', currentTriggerMode); localStorage.setItem('bacc_bet', currentBettingMode);
            closeSettings(); sendAction('UPDATE_SETTINGS');
        }

        let isEngineRunning = false;
        async function sendAction(command, action = null) {
            if (isEngineRunning) return; 
            isEngineRunning = true; 
            if (navigator.vibrate && command === 'INPUT') navigator.vibrate(40); 
            if (command !== 'INPUT' && command !== 'UNDO') showLoader();
            
            const btnB = document.querySelector('.bg-b'), btnP = document.querySelector('.bg-p');
            if(btnB && btnP) { btnB.classList.add('btn-disabled'); btnP.classList.add('btn-disabled'); }

            try {
                const response = await fetch(API_URL + '/api/action', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: CRED.u, password: CRED.p, command: command, action: action, triggerMode: currentTriggerMode, bettingMode: currentBettingMode })
                });
                if (response.status === 401 || response.status === 403) { alert("状态异常，请联系管理员！"); logout(true); return; }
                renderUI(await response.json()); 
            } catch (error) { alert("网络异常，数据已在云端保护中。"); } 
            finally { hideLoader(); isEngineRunning = false; if(btnB && btnP) { setTimeout(() => { btnB.classList.remove('btn-disabled'); btnP.classList.remove('btn-disabled'); }, 50); } }
        }

        function renderUI(S) {
            window.requestAnimationFrame(() => {
                if(!S) return;
                if (S.triggerMode === 8) {
                    localStorage.setItem('bacc_trig', '8');
                    localStorage.setItem('bacc_bet', 'radar');
                    window.location.href = '/radar8.html';
                    return;
                }

                if (S.triggerMode && S.bettingMode) {
                    currentTriggerMode = S.triggerMode;
                    currentBettingMode = S.bettingMode;
                    localStorage.setItem('bacc_trig', currentTriggerMode);
                    localStorage.setItem('bacc_bet', currentBettingMode);
                }
                
                if (S._role) {
                    let allowedArr = S._role === 'admin' ? ["1","2","3","4","5","6","7"] : (S._allowedStrategies ? S._allowedStrategies.split(',').map(s=>s.trim()) : []);
                    let newHtml = ''; let hasAny = false;
                    ALL_STRATEGIES.forEach(str => { if (allowedArr.includes(str.id.toString())) { newHtml += `<option value="${str.val}">${str.label}</option>`; hasAny = true; } });
                    if (document.getElementById('selStrategy').innerHTML !== newHtml) document.getElementById('selStrategy').innerHTML = newHtml;
                    document.getElementById('btnSetting').style.display = hasAny ? 'block' : 'none';
                    
                    // 🚨 终极隐藏指令：只有上帝(admin)才能看到底部历史记录大表！
                    if (S._role === 'admin') {
                        document.querySelector('.table-wrap').style.display = 'block';
                    } else {
                        document.querySelector('.table-wrap').style.display = 'none';
                    }
                }

                let btnB = document.querySelector('.bg-b');
                let btnP = document.querySelector('.bg-p');
                let statusLabel = document.getElementById('gameStatusLabel');

                if (S.gameStatus === 'LOCKED') {
                    statusLabel.innerText = "⛔ 未分配任何运算模型，终端已锁死"; 
                    statusLabel.style.color = "var(--loss)";
                    if(btnB && btnP) { btnB.style.display = 'none'; btnP.style.display = 'none'; }
                } else {
                    if(btnB && btnP) { btnB.style.display = 'block'; btnP.style.display = 'block'; }
                    if (S.gameStatus === 'WON') { statusLabel.innerText = "🎉 分析完成 - 请点击重置开启新组"; statusLabel.style.color = "var(--win)"; } 
                    else if (S.gameStatus === 'STREAK_LIMIT') { statusLabel.innerText = "🛑 阈值截断 - 请点击重置"; statusLabel.style.color = "var(--accent)"; } 
                    else if (S.gameStatus === 'GAMEOVER') { statusLabel.innerText = "⚠️ 样本结束 - 周期窗口耗尽"; statusLabel.style.color = "var(--loss)"; } 
                    else {
                        if (S.triggerMode === 7) { statusLabel.innerText = "🟠 自适应状态机 (云端守护) - 锁定攻击中"; statusLabel.style.color = "var(--warn-yellow)"; }
                        else if (S.triggerMode === 6) { statusLabel.innerText = "🟣 策略 6 (云端守护) - 双核对冲"; statusLabel.style.color = "var(--accent)";}
                        else if (S.triggerMode === 5) { statusLabel.innerText = "🟢 策略 5 (云端守护) - 大路四式"; statusLabel.style.color = "var(--accent)";} 
                        else if (S.triggerMode === 'hand') { statusLabel.innerText = "🟢 策略 3 (云端守护) - 连续流水线"; statusLabel.style.color = "var(--accent)";} 
                        else if (S.bettingMode === 'labouchere') { statusLabel.innerText = "🟢 策略 4 (云端守护) - 拉布谢尔"; statusLabel.style.color = "var(--accent)";} 
                        else { statusLabel.innerText = "🟢 策略 1/2 (云端守护) - 动态追踪"; statusLabel.style.color = "var(--accent)";}
                    }
                }

                const wins = (S.wlHistory || []).filter(x => x === '✅').length; const losses = (S.wlHistory || []).filter(x => x === '❌').length;
                document.getElementById('totalPL').innerText = (S.totalPL > 0 ? "+" : "") + S.totalPL;
                document.getElementById('totalPL').className = S.totalPL > 0 ? 'pl-value win-color' : (S.totalPL < 0 ? 'pl-value loss-color' : 'pl-value');

                const labBox = document.getElementById('labouchereBox'); const dualBox = document.getElementById('dualCoreBox');
                if (S.triggerMode === 6) {
                    labBox.style.display = 'none'; dualBox.style.display = 'grid';
                    document.getElementById('c4SeqText').innerText = S.c4_seq.length > 0 ? S.c4_seq.join(' - ') : '重置中'; document.getElementById('c4PlText').innerHTML = `单边: <span class="${S.c4_session_pl>0?'win-color':(S.c4_session_pl<0?'loss-color':'')}">${S.c4_session_pl}</span>`;
                    document.getElementById('c5SeqText').innerText = S.c5_seq.length > 0 ? S.c5_seq.join(' - ') : '重置中'; document.getElementById('c5PlText').innerHTML = `单边: <span class="${S.c5_session_pl>0?'win-color':(S.c5_session_pl<0?'loss-color':'')}">${S.c5_session_pl}</span>`;
                    document.getElementById('lblFibLevel').innerText = '模型阶段'; document.getElementById('fibLevel').innerText = '并发中';
                    document.getElementById('lblTrigger').innerText = '运算目标'; let t4 = S.targetProp ? (S.targetProp === 'A' ? '[庄]' : '[闲]') : '空'; let t5 = S.macroTarget ? (S.macroTarget === 'D' ? '[双]' : '[单]') : '空'; document.getElementById('targetProp').innerText = `4:${t4} 5:${t5}`; document.getElementById('targetProp').className = 'cum-val';
                    document.getElementById('lblStreak').innerText = '分布阵型'; document.getElementById('streakCount').innerText = S.history.length > 0 ? S.history.map(g => (g === 'BB' || g === 'PP') ? '双' : '单').slice(-3).join('') : '-'; document.getElementById('streakCount').className = 'cum-val'; document.getElementById('streakRate').style.display = 'none';
                    document.getElementById('lblProgress').innerText = '双核对冲量化模型 (自动迭代)'; document.getElementById('regFill').style.width = '100%'; document.getElementById('regFill').style.background = 'linear-gradient(90deg, #b043ff 0%, #0a84ff 100%)'; document.getElementById('regPercent').innerText = '运算中';
                } else if (S.triggerMode === 7) {
                    labBox.style.display = 'none'; dualBox.style.display = 'none';
                    document.getElementById('lblFibLevel').innerText = '回归层级'; document.getElementById('fibLevel').innerText = S.fibIdx; document.getElementById('fibLevel').className = 'cum-val';
                    document.getElementById('lblTrigger').innerText = '状态锁定'; document.getElementById('targetProp').innerText = S.targetProp ? (S.targetProp==='A'?'指0(庄)':'指1(闲)') : "特征提取中"; document.getElementById('targetProp').className = S.targetProp ? (S.targetProp==='A'?'cum-val side-B':'cum-val side-P') : 'cum-val wait-color';
                    document.getElementById('lblStreak').innerText = '当前序列'; document.getElementById('streakCount').innerText = S.streak; document.getElementById('streakCount').className = 'cum-val'; document.getElementById('streakRate').style.display = 'none';
                    document.getElementById('lblProgress').innerText = '自适应状态机量化模型'; document.getElementById('regFill').style.width = '100%'; document.getElementById('regFill').style.background = 'linear-gradient(90deg, #ff9500 0%, #ff453a 100%)'; document.getElementById('regPercent').innerText = '运算中';
                } else {
                    dualBox.style.display = 'none';
                    if (S.bettingMode === 'labouchere') { labBox.style.display = 'block'; document.getElementById('lblFibLevel').innerText = '消数余量'; document.getElementById('fibLevel').innerText = S.labouchereSeq.length + '项'; document.getElementById('fibLevel').className = 'cum-val'; document.getElementById('labouchereSeqText').innerText = S.labouchereSeq.length > 0 ? S.labouchereSeq.join(' - ') : '已清空 (等待重置)'; } else { labBox.style.display = 'none'; document.getElementById('lblFibLevel').innerText = S.bettingMode === 'martingale' ? '注码(马丁)' : '注码(斐波)'; document.getElementById('fibLevel').innerText = S.fibIdx; document.getElementById('fibLevel').className = 'cum-val'; }
                    if (S.triggerMode === 5) {
                        document.getElementById('lblTrigger').innerText = '当前目标'; document.getElementById('targetProp').innerText = S.macroTarget ? (S.macroTarget === 'D' ? '抓 [双]' : '抓 [单]') : "观望找信号"; document.getElementById('targetProp').className = S.macroTarget ? 'cum-val win-color' : 'cum-val wait-color';
                        document.getElementById('lblStreak').innerText = '宏观阵型'; document.getElementById('streakCount').innerText = S.history.length > 0 ? S.history.map(g => (g === 'BB' || g === 'PP') ? '双' : '单').slice(-3).join('') : '-'; document.getElementById('streakRate').style.display = 'none';
                        document.getElementById('lblProgress').innerText = '拉布谢尔无限循环追踪模式'; document.getElementById('regFill').style.width = '100%'; document.getElementById('regPercent').innerText = '无限';
                    } else if (S.triggerMode === 'hand') {
                        document.getElementById('lblTrigger').innerText = '当前阶段'; let pName = S.s3State === 'PHASE1' ? 'P1(观望)' : (S.s3State === 'PHASE2' ? 'P2(一裁)' : 'P3(二裁)'); document.getElementById('targetProp').innerText = pName; document.getElementById('targetProp').className = 'cum-val wait-color';
                        document.getElementById('lblStreak').innerText = '攻击目标'; document.getElementById('streakCount').innerText = S.s3Target ? (S.s3Target==='B'?'0(庄)':'1(闲)') : '-'; document.getElementById('streakCount').className = S.s3Target ? (S.s3Target==='B'?'cum-val side-B':'cum-val side-P') : 'cum-val'; document.getElementById('streakRate').style.display = 'none';
                        document.getElementById('lblProgress').innerText = '连续手流水线追踪模式'; document.getElementById('regFill').style.width = '100%'; document.getElementById('regPercent').innerText = '无限';
                    } else {
                        document.getElementById('lblTrigger').innerText = S.triggerMode === 3 ? '目标(3连触发)' : '目标(2连触发)'; document.getElementById('targetProp').innerText = S.targetProp ? (S.targetProp==='A'?'A (打0)':'B (打1)') : "无"; document.getElementById('targetProp').className = S.targetProp ? (S.targetProp==='A'?'cum-val side-B':'cum-val side-P') : 'cum-val wait-color';
                        if (S.bettingMode === 'fib' && S.triggerMode === 2) { document.getElementById('lblStreak').innerText = '注码周期盈亏'; document.getElementById('streakCount').innerText = S.sessionPL; document.getElementById('streakCount').className = S.sessionPL > 0 ? 'cum-val win-color' : (S.sessionPL < 0 ? 'cum-val loss-color' : 'cum-val'); document.getElementById('streakRate').style.display = 'none'; document.getElementById('lblProgress').innerText = '60组窗口进度 (局内正收益止盈)';
                        } else { document.getElementById('lblStreak').innerText = '连击层数'; document.getElementById('streakCount').innerText = S.streak; document.getElementById('streakCount').className = 'cum-val'; document.getElementById('streakRate').style.display = 'inline'; document.getElementById('lblProgress').innerText = '16组窗口进度'; }
                        if (S.gameStatus === 'WON' || S.gameStatus === 'STREAK_LIMIT') { document.getElementById('regFill').style.width = '100%'; document.getElementById('regPercent').innerText = '完成'; } else { let maxG = (S.bettingMode === 'fib' && S.triggerMode === 2) ? 60 : 16; let progress = Math.min((S.group - 1 + (S.hand===2?0.5:0)) / maxG * 100, 100); document.getElementById('regFill').style.width = progress + '%'; document.getElementById('regPercent').innerText = Math.floor(progress) + '%'; }
                    }
                }

                document.getElementById('betCount').innerText = (wins + losses);
                document.getElementById('wlStatsText').innerText = `正: ${wins} | 负: ${losses} | 胜率: ${(wins+losses)>0 ? Math.round((wins/(wins+losses))*100):0}%`;
                const wlList = document.getElementById('wlList'); wlList.innerHTML = (S.wlHistory || []).slice(-150).map(item => `<span class="${item==='✅'?'wl-item-win':'wl-item-loss'}">${item}</span>`).join(''); wlList.scrollTop = wlList.scrollHeight;
                
                const logBox = document.getElementById('sysLogBox');
                if (S.sysLogs && S.sysLogs.length > 0) { logBox.innerHTML = S.sysLogs.map(l => `<div class="log-entry">${l}</div>`).join(''); logBox.scrollTop = logBox.scrollHeight; }

                let instr = S.currentInstruction || { side: null, amt: 0, msg: "观 望", detail: "等待数据录入" };
                let infTag = (S.triggerMode === 'hand' || S.triggerMode === 5 || S.triggerMode === 6 || S.triggerMode === 7 || S.bettingMode === 'labouchere') ? ' (持续)' : '';
                document.getElementById('phaseTag').innerText = `第 ${S.group} 组 | 位置 ${S.hand}${infTag}`;
                let dir = document.getElementById('instrDir');
                if (instr.amt === 0) { dir.innerText = instr.msg; dir.className = "side-Wait"; document.getElementById('instrAmt').innerText = ""; } 
                else { dir.innerText = instr.side === 'B' ? "庄(0)" : "闲(1)"; dir.className = instr.side === 'B' ? "side-B" : "side-P"; document.getElementById('instrAmt').innerText = instr.amt; }
                document.getElementById('instrDetail').innerText = instr.detail;

                let html = "";
                for(let i=0; i<Math.min((S.records||[]).length, 60); i++) {
                    let rec = S.records[i];
                    html += `<tr><td>G${rec.id}</td><td style="font-weight:bold; color:#fff">${rec.h1 === 'B' ? '0' : (rec.h1 === 'P' ? '1' : '-')} , ${rec.h2 === 'B' ? '0' : (rec.h2 === 'P' ? '1' : '-')}</td><td class="${rec.pl>0?'win-color':(rec.pl<0?'loss-color':'wait-color')}" style="font-size:11px">${rec.action || '-'}</td><td class="${rec.totalPL>0?'win-color':(rec.totalPL<0?'loss-color':'wait-color')}" style="font-weight:bold">${rec.totalPL>0?'+':''}${rec.totalPL}</td></tr>`;
                }
                document.getElementById('gameTable').innerHTML = html;
            });
        }
    </script>
</body>
</html>
